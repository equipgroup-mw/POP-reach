<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Point of Progress Reach</title>
  <meta name="description" content="Point of Progress Reach — Impact across Malawi" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020244">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Point of Progress Reach">
  <link rel="icon" href="popLOGO.png" type="image/png">
  <link rel="apple-touch-icon" href="popLOGO.png">

  <style>
    /* 
      Minimal loading screen — shown only if redirect takes a moment.
      Users shouldn't really see this, but it's a safety net.
    */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #eceef2;
      font-family: 'DM Sans', 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .redirect-container {
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.3s forwards;
    }

    .redirect-logo {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(2,2,68,0.15);
    }

    .redirect-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 24px;
      color: #020244;
      margin: 0 0 8px 0;
      font-weight: 700;
    }

    .redirect-subtitle {
      font-size: 14px;
      color: #666;
      margin: 0;
      font-weight: 500;
    }

    .redirect-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(2,2,68,0.1);
      border-top-color: #3CBFA9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Hide everything quickly if redirect already happened */
    .redirected {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- 
    This is only visible if the redirect somehow takes more than ~300ms.
    Normally the JS redirect happens before the user sees anything.
  -->
  <div class="redirect-container" id="redirect-screen">
    <img src="popLOGO.png" alt="Point of Progress" class="redirect-logo" />
    <h1 class="redirect-title">Point of Progress Reach</h1>
    <p class="redirect-subtitle">Loading the best experience for your device…</p>
    <div class="redirect-spinner"></div>
  </div>

  <script>
  (function() {
    // ─────────────────────────────────────────────
    //  DEVICE DETECTION & REDIRECT
    //  Runs immediately — no DOMContentLoaded needed
    // ─────────────────────────────────────────────

    /**
     * Determine if the current device is a mobile phone.
     * 
     * Strategy (in priority order):
     *   1. Screen width ≤ 768px  →  mobile
     *   2. Touch support + small screen (≤ 1024px)  →  mobile
     *   3. User-agent contains "Mobi" (phones)  →  mobile
     *   4. Everything else  →  desktop (iPads, tablets, laptops, PCs)
     *
     * iPads and larger tablets get the desktop version because:
     *   - They have enough screen real estate for the side panel layout
     *   - Modern iPads report iPadOS in the UA (not "Mobi")
     *   - iPad mini (smallest iPad) still has 768px+ width in landscape
     */
    function isMobilePhone() {
      const width  = window.innerWidth;
      const height = window.innerHeight;
      const ua     = navigator.userAgent || '';

      // 1. Narrow screen → definitely a phone
      if (width <= 768) return true;

      // 2. Touch device with moderate width → likely a phone in landscape
      const hasTouch = (
        'ontouchstart' in window ||
        navigator.maxTouchPoints > 0 ||
        navigator.msMaxTouchPoints > 0
      );

      if (hasTouch && width <= 1024 && height <= 768) {
        // Small touch device — phone in landscape (e.g. 926×428 iPhone)
        return true;
      }

      // 3. User-agent contains "Mobi" (common for phones, not iPads/tablets)
      if (/Mobi|Android.*Mobile/i.test(ua)) return true;

      // 4. Everything else → desktop/tablet
      return false;
    }

    /**
     * Build the target URL.
     * Ensures we stay in the same directory as index.html.
     */
    function getTargetUrl(page) {
      // Get the current path and replace index.html with the target page
      const currentPath = window.location.pathname;
      
      if (currentPath.endsWith('index.html') || currentPath.endsWith('/')) {
        // Replace index.html or append to directory
        const base = currentPath.replace(/index\.html$/, '').replace(/\/$/, '');
        return base + '/' + page;
      }
      
      // Fallback — just use same directory
      return page;
    }

    // ─────────────────────────────────────────────
    //  EXECUTE REDIRECT
    // ─────────────────────────────────────────────
    const mobile  = isMobilePhone();
    const target  = mobile ? getTargetUrl('mobile.html') : getTargetUrl('desktop.html');

    // Log for debugging (remove in production if desired)
    console.log(
      `POP Reach — Device: ${mobile ? '📱 Mobile Phone' : '🖥️ Desktop / Tablet'}` +
      ` | Screen: ${window.innerWidth}×${window.innerHeight}` +
      ` | Redirecting to: ${target}`
    );

    // Immediate redirect — user shouldn't see this page
    window.location.replace(target);

    // Safety fallback: if redirect hasn't happened after 500ms,
    // show the spinner (it's already there but hidden by opacity)
    setTimeout(() => {
      // If we're still on this page, the redirect failed somehow
      document.getElementById('redirect-screen')?.classList.remove('redirected');
    }, 500);

  })();
  </script>

</body>
</html>
